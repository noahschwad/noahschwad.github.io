<title>Noah Schwadron — Designer</title>

<div class="container">

  <div style="width:100%; height: 137px;"></div>

  <div class="evenRow menu">

    {%- if site.posts.size > 0 -%}

        {%- for post in site.posts -%}

          <div class="standardBox menu darkShadow">
            <a href="{{ post.url | relative_url }}" >
              {%- if post.thumbnail -%}
                <img src="{{ post.thumbnail }}" class="paddedPic">
              {%- endif -%}
              <h4 class="menuTitle">{{ post.title }}</h4>
            </a>
          </div>

          {%- if site.show_excerpts -%}
            {{ post.excerpt }}
          {%- endif -%}

        {%- endfor -%}

      {%- endif -%}


    </div>

  </div>
