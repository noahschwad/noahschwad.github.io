  <body>

    <div id="container">

      <script src="assets/header2.js"></script>

      <div class="w3-half left">
        <div id="sketch-holder2" class="tilepic" align="center" style="border-width:10px;
                                       border-style: solid;
                                       border-color: #89AA9B;
                                       background-color: #89AA9B;">
        </div>
        <script> document.getElementById('sketch-holder2').style.height = document.getElementById("sketch-holder2").offsetWidth; </script>

          <div id="controls" style="">
            <h3 style = "margin-top: 0px;
                         float: left;
                         font-size: 20px;
                         padding: 0px;">
              Press <strong>Start</strong> and then change the speed as you like. (Speed takes a moment to change)
            </h3>

            <div style="margin-top: 20px; clear: both;">

              <input id="starter"
                     type="button"
                     value="Start"
                     onclick="mallet1.start();
                              mallet2.start();
                              this.setAttribute('onclick','Tone.Master.mute ^= true;');
                              this.setAttribute('value','Mute');"
                     style=""/>

              <span class = "speed2">
                Speed Synth1
                <input id="speed2" type="range" min="2" max="5" value="3" class="slider">
              </span>


            </div>
          </div>
        </div>
        <p class="text" style="margin-top: 20px; width: calc(100% - 7px); padding: 0px;">
          Each ball plays a sequence of 8 notes that changes randomly. <br> You may find that controlling the speed excites you.
        </p>
